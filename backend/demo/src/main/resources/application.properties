# ========================
# APPLICATION
# ========================
spring.application.name=mental-health-platform

# ========================
# DATASOURCE (MySQL)
# ========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/mental_health_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Jeevanandham@093
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Hibernate Dialect (Optional for Spring Boot 3)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# JWT CONFIGURATION
# ========================
app.jwt.secret=mentalHealthPlatformJwtSecretKeyForDevelopment2026SecureKey123456789
app.jwt.expiration-ms=86400000

# ========================
# SPRINGDOC / SWAGGER
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ========================
# SQL INITIALIZATION
# ========================
# data.sql deduplicates then seeds questions safely on every restart
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ========================
# SERVER
# ========================
server.port=8080

# ========================
# LOGGING
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE